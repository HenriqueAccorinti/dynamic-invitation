<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anjo Guardião</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #dde6f0;
    font-family: 'Cormorant Garamond', serif;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(180,210,240,0.35) 0%, transparent 55%),
      radial-gradient(circle at 80% 70%, rgba(160,200,235,0.25) 0%, transparent 55%);
    pointer-events: none;
  }

  /* ── 3D flip ── */
  .scene {
    width: 580px;
    height: 280px;
    perspective: 1200px;
    cursor: pointer;
    transition: filter 0.3s;
  }
  .scene:hover {
    filter: drop-shadow(0 16px 40px rgba(60,110,170,0.2));
  }

  .flipper {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.85s cubic-bezier(0.645, 0.045, 0.355, 1.000);
  }
  .scene.flipped .flipper { transform: rotateY(180deg); }

  .face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .face-back { transform: rotateY(180deg); }

  /* ── FRONT ── */
  .ticket {
    width: 100%; height: 100%;
    background: #f5f8fc;
    border: 1.5px solid #bdd0e5;
    border-radius: 8px;
    display: flex;
    flex-direction: row;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 2px 4px rgba(80,130,180,0.07),
      0 6px 28px rgba(80,130,180,0.13);
  }

  /* Mouse shimmer — pure white, larger */
  .shimmer-layer {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 20;
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.2s;
    background: radial-gradient(
      circle 180px at var(--mx, 50%) var(--my, 50%),
      rgba(255,255,255,0.72) 0%,
      rgba(255,255,255,0.18) 45%,
      transparent 70%
    );
  }
  .scene:hover .shimmer-layer { opacity: 1; }

  /* Left stripe (vertical, retrô) */
  .stripe-left {
    width: 8px;
    flex-shrink: 0;
    background: repeating-linear-gradient(
      180deg,
      #5fa8ce 0px, #5fa8ce 9px,
      #93c4de 9px, #93c4de 14px,
      #bddaf0 14px, #bddaf0 18px,
      #93c4de 18px, #93c4de 23px
    );
  }
  .stripe-right {
    width: 8px;
    flex-shrink: 0;
    background: repeating-linear-gradient(
      180deg,
      #5fa8ce 0px, #5fa8ce 9px,
      #93c4de 9px, #93c4de 14px,
      #bddaf0 14px, #bddaf0 18px,
      #93c4de 18px, #93c4de 23px
    );
  }

  /* Left panel — logo + title */
  .ticket-left {
    width: 200px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
    border-right: 1px dashed #bdd0e5;
    position: relative;
    gap: 10px;
  }

  .ticket-left::before,
  .ticket-left::after {
    content: "✦";
    position: absolute;
    font-size: 9px;
    color: #93c4de;
    left: 50%;
    transform: translateX(-50%);
  }
  .ticket-left::before { top: 12px; }
  .ticket-left::after  { bottom: 12px; }

  /* Notch top/bottom on divider */
  .notch-top, .notch-bottom {
    position: absolute;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #dde6f0;
    border: 1.5px solid #bdd0e5;
    right: -10px;
    z-index: 2;
  }
  .notch-top    { top: -9px; }
  .notch-bottom { bottom: -9px; }

  .angel-logo {
    width: 90px; height: 90px;
    object-fit: contain;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    filter: drop-shadow(0 2px 6px rgba(80,140,200,0.18));
  }
  .scene:hover .angel-logo { transform: translateY(-4px) scale(1.06); }

  .event-title {
    font-family: "Playfair Display", serif;
    font-size: 18px;
    font-weight: 700;
    color: #1a3558;
    text-align: center;
    letter-spacing: 0.02em;
    line-height: 1.2;
  }
  .event-subtitle {
    font-family: "DM Mono", monospace;
    font-size: 7.5px;
    letter-spacing: 0.2em;
    color: #7ab3d4;
    text-transform: uppercase;
    text-align: center;
  }

  /* Right panel — fields */
  .ticket-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 18px 20px 14px;
    gap: 0;
  }

  .fields-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 12px 16px;
    align-content: center;
  }

  .field { display: flex; flex-direction: column; gap: 2px; }
  .field.span2 { grid-column: span 2; }

  .field-label {
    font-family: "DM Mono", monospace;
    font-size: 7.5px;
    letter-spacing: 0.16em;
    color: #90bcd6;
    text-transform: uppercase;
  }
  .field-value {
    font-family: "Cormorant Garamond", serif;
    font-size: 14px;
    color: #1a3558;
    line-height: 1.3;
  }
  .field-value.large { font-size: 15px; font-weight: 600; }

  /* Divider + footer */
  .ticket-divider {
    height: 1px;
    background: repeating-linear-gradient(
      90deg,
      #bdd0e5 0px, #bdd0e5 6px,
      transparent 6px, transparent 12px
    );
    margin: 10px 0 10px;
  }

  .ticket-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(100,170,210,0.1);
    border: 1px solid rgba(100,170,210,0.28);
    border-radius: 20px;
    padding: 3px 10px;
  }
  .status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #5b9fbf;
    animation: pulse 2.2s ease infinite;
  }
  @keyframes pulse {
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:.55; transform:scale(.8); }
  }
  .status-text {
    font-family: "DM Mono", monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    color: #4a8aaa;
  }

  .barcode-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .barcode {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 24px;
  }
  .barcode-bar {
    border-radius: 1px;
    background: #a8c8de;
    transition: background 0.3s;
  }
  .scene:hover .barcode-bar {
    background: #2a6a98;
    animation: bwave 0.5s ease var(--d,0s) forwards;
  }
  @keyframes bwave {
    0%{ transform:scaleY(1); }
    40%{ transform:scaleY(1.5); }
    100%{ transform:scaleY(1); }
  }
  .ticket-serial {
    font-family: "DM Mono", monospace;
    font-size: 8px;
    color: #90bcd6;
    letter-spacing: 0.12em;
    line-height: 1.6;
    text-align: right;
  }

  /* ── BACK FACE ── */
  .ticket-back {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #1b3a5e 0%, #0d2038 60%, #1a334f 100%);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 28px 36px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(10,25,55,0.45), inset 0 1px 0 rgba(255,255,255,0.07);
  }

  .back-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(122,179,212,0.1);
  }
  .back-ring-1 { width: 300px; height: 300px; top:-130px; right:-80px; }
  .back-ring-2 { width: 220px; height: 220px; bottom:-100px; left:-60px; }

  .back-angel {
    width: 80px; height: 80px;
    object-fit: contain;
    filter: brightness(0) invert(1) drop-shadow(0 0 16px rgba(122,179,212,0.5));
    animation: float 3.2s ease-in-out infinite;
    flex-shrink: 0;
    position: relative; z-index:1;
  }
  @keyframes float {
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-8px); }
  }

  .back-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    position: relative; z-index:1;
  }

  .back-divider-v {
    width: 1px; height: 120px;
    background: linear-gradient(180deg, transparent, rgba(122,179,212,0.35), transparent);
    flex-shrink: 0;
    position: relative; z-index:1;
  }

  .back-phrase {
    text-align: center;
  }
  .back-phrase-label {
    font-family: "DM Mono", monospace;
    font-size: 7px;
    letter-spacing: 0.22em;
    color: rgba(122,179,212,0.5);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .back-phrase-text {
    font-family: "Playfair Display", serif;
    font-style: italic;
    font-size: 17px;
    color: #c8dff0;
    line-height: 1.65;
  }

  .back-code {
    font-family: "DM Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.26em;
    color: rgba(140,190,220,0.5);
  }
  .back-code em { font-style:normal; color:#7ab3d4; }

  .back-hint {
    position: absolute;
    bottom: 14px; right: 18px;
    font-family: "DM Mono", monospace;
    font-size: 7px;
    letter-spacing: 0.16em;
    color: rgba(122,179,212,0.22);
    text-transform: uppercase;
  }
</style>
</head>

<script>
  const scene   = document.getElementById("scene");
  const shimmer = document.getElementById("shimmer");

  scene.addEventListener("mousemove", e => {
    const r = scene.getBoundingClientRect();
    shimmer.style.setProperty("--mx", ((e.clientX - r.left) / r.width  * 100).toFixed(1) + "%");
    shimmer.style.setProperty("--my", ((e.clientY - r.top)  / r.height * 100).toFixed(1) + "%");
  });

  scene.addEventListener("click", () => scene.classList.toggle("flipped"));

  // Barcode
  const bc = document.getElementById("barcode");
  [15,9,19,7,17,11,21,8,13,7,19,10,16,9,21,7,14,12,18,9,16,7,20].forEach((h, i) => {
    const b = document.createElement("div");
    b.className = "barcode-bar";
    b.style.cssText = "width:" + (i%3===0?"3px":"2px") + ";height:" + h + "px";
    b.style.setProperty("--d", (i * 0.018) + "s");
    bc.appendChild(b);
  });
</script>
